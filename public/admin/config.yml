# public/admin/config.yml

backend:
  name: github
  repo: akshayxemo/personal-site
  branch: main
  base_url: https://akshaykumardas.vercel.app
  auth_endpoint: api/auth

media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: simple

collections:
  - name: "projects"
    label: "Projects"
    folder: "content/projects"
    create: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"

    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Summary"
        name: "summary"
        widget: "text"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Web App"
          - "Open Source"
          - "Developer Tooling"
          - "Design System"
          - "API & Backend"

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false

      - label: "Tech Stack"
        name: "stack"
        widget: "list"
        required: false

      - label: "Role"
        name: "role"
        widget: "string"
        required: false

      - label: "Year"
        name: "year"
        widget: "number"
        value_type: "int"

      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false

      - label: "Order"
        name: "order"
        widget: "number"
        value_type: "int"
        default: 100

      - label: "Status"
        name: "status"
        widget: "select"
        default: "Shipped"
        options:
          - "Shipped"
          - "In Progress"
          - "Archived"

      - label: "Cover Image"
        name: "cover"
        widget: "image"

      - label: "Links"
        name: "links"
        widget: "object"
        required: false
        fields:
          - label: "Live URL"
            name: "live"
            widget: "string"
            required: false

          - label: "Repository URL"
            name: "repo"
            widget: "string"
            required: false

          - label: "Case Study URL"
            name: "caseStudy"
            widget: "string"
            required: false

      - label: "Content"
        name: "body"
        widget: "markdown"

  - name: "articles"
    label: "Articles"
    folder: "content/articles"
    create: true
    slug: "{{slug}}"
    extension: "mdx"
    format: "frontmatter"

    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Summary"
        name: "summary"
        widget: "text"

      - label: "Date"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false

      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false

      - label: "Cover Image"
        name: "cover"
        widget: "image"
        required: false

      - label: "Content"
        name: "body"
        widget: "markdown"